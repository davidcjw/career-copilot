services:
  db:
    # Postgres 16 with the pgvector extension preinstalled.
    image: pgvector/pgvector:pg16
    container_name: career_copilot_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: career_copilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d career_copilot"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
